# Power binds - only active when hyprlock is running
binddl = SUPER, ESCAPE, Turn off display, exec, pgrep hyprlock && nohup bash -c "sleep 0.3 && hyprctl dispatch dpms off" >/dev/null 2>&1
binddl = SUPER, S, Suspend, exec, pgrep hyprlock && systemctl suspend
binddl = SUPER, R, Reboot, exec, pgrep hyprlock && omarchy-system-reboot
binddl = SUPER, P, Shutdown, exec, pgrep hyprlock && omarchy-system-shutdown
